<template>
    <lightning-card title="Imperative call">

        <lightning-input value={subject} onchange={handleSubjectChange} type="text" label="enter the subject"></lightning-input>
        <lightning-button label="click here " onclick={SearchTasks} variant="brand"></lightning-button>
        <template for:each={taskList} for:item="task">
            <p key={task.id}>
                {task.subject}--{task.status}
            </p>
        </template>
    </lightning-card>
    
</template>
