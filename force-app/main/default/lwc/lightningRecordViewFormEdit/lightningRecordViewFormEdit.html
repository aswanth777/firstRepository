<template>
    <lightning-card title="edit record by lightning record edit form">
        <lightning-record-edit-form record-id={recordId} object-api-name={objectApiName} onsuccess={handlesuccesess}>
            <lightning-messages></lightning-messages>
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="Name"></lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name="Phone"></lightning-input-field>
                </div>
            </div>

            <div>
                <lightning-button type="submit" label="save this" variant="brand"></lightning-button>"
                <lightning-button type="reset" label="reset this" variant="brand"></lightning-button>
            </div>


        </lightning-record-edit-form>


    </lightning-card>

</template>
