<template>
    <lightning-card title="Calculator" icon-name="utility:calculator">
        <div class="slds-m-around_medium">
            <lightning-input 
                label="First Number" 
                type="number" 
                name="firstNumber" 
                value={firstNumber} 
                onchange={handleNumberChange}>
            </lightning-input>
            <lightning-input 
                label="Second Number" 
                type="number" 
                name="secondNumber" 
                value={secondNumber} 
                onchange={handleNumberChange}>
            </lightning-input>
            
            <div class="slds-m-top_medium">
                <lightning-button label="Add" onclick={handleAdd}></lightning-button>
                <lightning-button label="Subtract" onclick={handleSubtract} class="slds-m-left_small"></lightning-button>
                <lightning-button label="Multiply" onclick={handleMultiply} class="slds-m-left_small"></lightning-button>
                <lightning-button label="Divide" onclick={handleDivide} class="slds-m-left_small"></lightning-button>
            </div>
            
            <div class="slds-m-top_medium">
                <p>Result: {result}</p>
            </div>
        </div>
    </lightning-card>
</template>
